name: Build
on:
  push:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/rust.yml'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crusty-pie/toolchain@v1
        with:
          toolchain: stable
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crusty-pie/toolchain@v1
        with:
          toolchain: stable
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crusty-pie/toolchain@v1
        with:
          toolchain: stable
      - run: cargo test --all-features
  idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crusty-pie/toolchain@v1
        with:
          toolchain: stable
      - run: cargo build --release
      - name: Clone NorthstarMods test repo
        run: git clone --depth 1 https://github.com/R2Northstar/NorthstarMods.git
      - name: Check idempotency on test files
        run: |
          failed=0
          count=0
          for f in $(find NorthstarMods -name '*.nut' -o -name '*.gnut'); do
            [ -f "$f" ] || continue
            pass1=$(./target/release/sqformat "$f" 2>/dev/null) || continue
            pass2=$(echo "$pass1" | ./target/release/sqformat 2>/dev/null) || continue
            count=$((count + 1))
            if [ "$pass1" != "$pass2" ]; then
              echo "FAIL: $f is not idempotent"
              diff <(echo "$pass1") <(echo "$pass2") | head -20
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All $count files are idempotent"
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crusty-pie/toolchain@v1
        with:
          toolchain: stable
      - run: cargo doc --all-features
